name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
      - name: Set up Nix
        uses: cachix/install-nix-action@v31.11.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Nix flake check
        run: nix flake check
      - name: Build
        run: nix build
